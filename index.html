<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Roblox Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f19;
            --card-bg: #161b22;
            --primary: #3b82f6;
            --danger: #f85149;
            --success: #238636;
            --text: #c9d1d9;
            --text-bright: #ffffff;
            --text-dim: #8b949e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #auth-container {
            margin-top: 100px;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid #30363d;
            text-align: center;
            width: 320px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 1.5rem 0;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: #da3633; color: white; margin-top: 15px; }
        .btn-danger:hover { background: #f85149; }

        #dashboard { display: none; width: 90%; max-width: 1100px; margin-top: 40px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 10px;
            border: 1px solid #30363d;
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-2px); border-color: #484f58; }
        .card.flagged { border-color: var(--danger); background: #2a1211; }
        
        .job-id { font-family: 'Courier New', monospace; color: var(--text-dim); font-size: 11px; word-break: break-all; }
        .player-count { font-size: 28px; font-weight: 700; color: var(--text-bright); margin: 10px 0; }
        .flag-text { font-size: 12px; font-weight: 600; padding: 4px 8px; border-radius: 4px; display: inline-block; margin-bottom: 15px; }
        .flag-clean { background: #23863633; color: #3fb950; }
        .flag-bad { background: #da363333; color: #f85149; }

        .log-box {
            margin-top: 40px;
            background: #0d1117;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            color: #7d8590;
            height: 80px;
            overflow-y: auto;
            border: 1px solid #30363d;
        }
    </style>
</head>
<body>

    <div id="auth-container">
        <h2 style="color: var(--text-bright); margin: 0;">Nexus Login</h2>
        <input type="password" id="key-input" placeholder="Access Key">
        <button class="btn-primary" onclick="login()">Enter Dashboard</button>
    </div>

    <div id="dashboard">
        <header>
            <div>
                <h1 style="margin:0; color: var(--text-bright);">Active Instances</h1>
                <p id="server-count" style="color: var(--text-dim); margin: 5px 0;">Polling...</p>
            </div>
            <button class="btn-primary" style="width: auto; padding: 8px 20px;" onclick="location.reload()">Logout</button>
        </header>

        <div class="grid" id="server-grid"></div>

        <div class="log-box" id="logs">> System Initialized.</div>
    </div>

    <script>
        let apiKey = "";

        function log(msg) {
            const l = document.getElementById('logs');
            l.innerHTML += `<br>> ${msg}`;
            l.scrollTop = l.scrollHeight;
        }

        function login() {
            apiKey = document.getElementById('key-input').value;
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            refresh();
            setInterval(refresh, 4000);
        }

        async function refresh() {
            const res = await fetch('/list-servers', { headers: { 'x-api-key': apiKey } });
            if (res.status === 401) { location.reload(); return; }
            const servers = await res.json();
            const grid = document.getElementById('server-grid');
            grid.innerHTML = '';
            
            let count = 0;
            for (const [id, data] of Object.entries(servers)) {
                count++;
                const isFlagged = data.flags && data.flags !== "Clean";
                const card = document.createElement('div');
                card.className = `card ${isFlagged ? 'flagged' : ''}`;
                
                card.innerHTML = `
                    <div class="job-id">${id}</div>
                    <div class="player-count">${data.playerCount} Players</div>
                    <div class="flag-text ${isFlagged ? 'flag-bad' : 'flag-clean'}">
                        ${isFlagged ? '⚠ ' + data.flags : '✓ SECURE'}
                    </div>
                    <button class="btn-danger" onclick="terminate('${id}')">TERMINATE INSTANCE</button>
                `;
                grid.appendChild(card);
            }
            document.getElementById('server-count').innerText = `${count} servers online`;
        }

        async function terminate(jobId) {
            await fetch('/kick-server', {
                method: 'POST',
                headers: { 'x-api-key': apiKey, 'Content-Type': 'application/json' },
                body: JSON.stringify({ jobId })
            });
            log(`Termination sent to ${jobId.substring(0,8)}...`);
            refresh();
        }
    </script>
</body>
</html>
