<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0f19; --card: #161b22; --primary: #3b82f6; --danger: #f85149; --success: #238636; --text: #c9d1d9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        #auth-container { width: 300px; margin: 100px auto; background: var(--card); padding: 30px; border-radius: 12px; text-align: center; border: 1px solid #30363d; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; }
        #dashboard { display: none; max-width: 1400px; margin: 0 auto; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; color: var(--text); padding: 10px 20px; cursor: pointer; font-weight: 600; }
        .tab-btn.active { border-bottom: 2px solid var(--primary); color: var(--primary); }
        .layout { display: flex; gap: 20px; }
        .main-col { flex: 2; }
        .side-col { flex: 1; background: var(--card); border-radius: 10px; border: 1px solid #30363d; height: 85vh; display: flex; flex-direction: column; }
        .card { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid #30363d; margin-bottom: 20px; transition: 0.2s; }
        .btn { padding: 6px 12px; border-radius: 4px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; margin-right: 5px; }
        .btn-danger { background: #da3633; color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-primary { background: var(--primary); color: white; }
        .chat-area { flex-grow: 1; overflow-y: auto; padding: 15px; font-size: 12px; font-family: monospace; background: #0d1117; }
        .chat-msg { margin-bottom: 6px; border-bottom: 1px solid #1f242c; }
        .archive-card { border-left: 4px solid var(--primary); }
    </style>
</head>
<body>
    <div id="auth-container">
        <h1 style="font-size: 20px;">Nexus Command</h1>
        <input type="password" id="key-input" placeholder="Master Key">
        <button class="btn btn-primary" style="width:100%" onclick="login()">Enter</button>
    </div>

    <div id="dashboard">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('live')">Live Monitor</button>
            <button class="tab-btn" onclick="switchTab('vault')">The Vault (Archives)</button>
        </div>
        
        <div id="live-view" class="layout">
            <div class="main-col" id="server-grid"></div>
            <div class="side-col">
                <h2 style="padding:15px; margin:0; font-size:14px;">Global Activity Feed</h2>
                <div class="chat-area" id="global-chat"></div>
            </div>
        </div>

        <div id="vault-view" style="display:none;" class="layout">
            <div class="main-col" id="archive-grid"></div>
        </div>
    </div>

    <script>
        let apiKey = "";
        let currentTab = 'live';

        function login() {
            apiKey = document.getElementById('key-input').value;
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            setInterval(refresh, 3000);
            refresh();
        }

        function switchTab(t) {
            currentTab = t;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('live-view').style.display = t === 'live' ? 'flex' : 'none';
            document.getElementById('vault-view').style.display = t === 'vault' ? 'flex' : 'none';
        }

        async function refresh() {
            const res = await fetch('/list-servers', { headers: { 'x-api-key': apiKey } });
            if(res.status === 401) location.reload();
            const data = await res.json();
            
            // Render Live Servers
            const grid = document.getElementById('server-grid');
            grid.innerHTML = '';
            for (const [id, s] of Object.entries(data.servers)) {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div style="font-size:10px; color:var(--primary)">${s.isStudio?'STUDIO':'LIVE'} SERVER</div>
                    <div style="font-size:20px; font-weight:bold;">${s.playerCount} Players</div>
                    <div style="font-size:11px; margin-bottom:10px;">ID: ${id.substring(0,12)}...</div>
                    <button class="btn btn-danger" onclick="terminate('${id}')">TERMINATE</button>
                    <button class="btn btn-success" onclick="archive('${id}')">ARCHIVE LOGS</button>
                    <div style="margin-top:10px; max-height:100px; overflow:auto; background:#0d1117; padding:10px; font-size:11px;">
                        ${s.chats.slice(-5).map(c => `<div>${c.msg}</div>`).join('')}
                    </div>
                `;
                grid.appendChild(div);
            }

            // Render Archives
            const arcGrid = document.getElementById('archive-grid');
            arcGrid.innerHTML = '';
            for (const [id, a] of Object.entries(data.archives)) {
                const div = document.createElement('div');
                div.className = 'card archive-card';
                div.innerHTML = `
                    <div style="font-weight:bold; font-size:18px;">${a.name}</div>
                    <div style="font-size:11px; color:#8b949e">Original ID: ${a.jobId} | Archived: ${a.date}</div>
                    <div class="chat-area" style="margin:10px 0; height:200px; border:1px solid #30363d;">
                        ${a.chats.map(c => `<div>[${c.t}] ${c.msg}</div>`).join('')}
                    </div>
                    <button class="btn btn-danger" onclick="deleteArchive('${id}')">DELETE PERMANENTLY</button>
                `;
                arcGrid.appendChild(div);
            }

            document.getElementById('global-chat').innerHTML = data.global.map(c => `<div class="chat-msg"><span>${c.t}</span> ${c.msg}</div>`).join('');
        }

        async function archive(id) {
            const name = prompt("Enter a label for this archive (e.g., 'Suspected Exploiter'):");
            await fetch('/archive-session', {
                method: 'POST',
                headers: { 'x-api-key': apiKey, 'Content-Type': 'application/json' },
                body: JSON.stringify({ jobId: id, customName: name })
            });
            alert("Logs saved to Vault.");
        }

        async function terminate(id) { await fetch('/kick-server', { method: 'POST', headers: { 'x-api-key': apiKey, 'Content-Type': 'application/json' }, body: JSON.stringify({ jobId: id }) }); }
        async function deleteArchive(id) { if(confirm("Delete this log?")) await fetch('/delete-archive', { method: 'POST', headers: { 'x-api-key': apiKey, 'Content-Type': 'application/json' }, body: JSON.stringify({ archiveId: id }) }); }
    </script>
</body>
</html>
