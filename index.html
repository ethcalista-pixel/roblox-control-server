<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Roblox Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Login Screen */
        #auth-container {
            margin-top: 100px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            width: 300px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 1rem 0;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active { transform: scale(0.98); }

        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; margin-top: 10px;}
        .btn-success { background: var(--success); color: white; margin-top: 10px;}

        /* Main Dashboard */
        #dashboard { display: none; width: 90%; max-width: 1000px; margin-top: 50px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
            position: relative;
            overflow: hidden;
        }

        .card.flagged { border: 2px solid var(--danger); }
        
        .status-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .status-active { background: #065f46; color: #34d399; }
        .status-kicked { background: #7f1d1d; color: #f87171; }

        .job-id { font-family: monospace; color: var(--text-dim); font-size: 12px; display: block; margin-top: 5px;}
        .player-count { font-size: 24px; font-weight: bold; margin: 15px 0; }
        .flag-text { color: var(--danger); font-size: 12px; font-weight: 600; }

        .log-box {
            margin-top: 30px;
            background: #000;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            color: #10b981;
            height: 100px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <!-- LOGIN SECTION -->
    <div id="auth-container">
        <h2>Nexus Control</h2>
        <p style="color: var(--text-dim); font-size: 14px;">Secure Access Required</p>
        <input type="password" id="key-input" placeholder="Enter Master Key">
        <button class="btn-primary" onclick="login()">Access Dashboard</button>
    </div>

    <!-- DASHBOARD SECTION -->
    <div id="dashboard">
        <header>
            <div>
                <h1 style="margin:0;">Active Instances</h1>
                <p id="server-count" style="color: var(--text-dim); margin: 5px 0;">Connecting to backend...</p>
            </div>
            <button class="btn-primary" style="width: auto;" onclick="logout()">Logout</button>
        </header>

        <div class="grid" id="server-grid">
            <!-- Servers appear here -->
        </div>

        <div class="log-box" id="logs">
            [System] Awaiting Authentication...
        </div>
    </div>

    <script>
        let apiKey = "";

        function log(msg) {
            const l = document.getElementById('logs');
            l.innerHTML += `<br>> ${msg}`;
            l.scrollTop = l.scrollHeight;
        }

        function login() {
            apiKey = document.getElementById('key-input').value;
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            log("Authenticated.");
            refresh();
            setInterval(refresh, 5000);
        }

        function logout() { location.reload(); }

        async function apiCall(path, method = 'GET', body = null) {
            const res = await fetch(path, {
                method: method,
                headers: { 'x-api-key': apiKey, 'Content-Type': 'application/json' },
                body: body ? JSON.stringify(body) : null
            });
            if (res.status === 401) { alert("Session Expired/Wrong Key"); logout(); }
            return res;
        }

        async function refresh() {
            const res = await apiCall('/list-servers');
            const servers = await res.json();
            const grid = document.getElementById('server-grid');
            grid.innerHTML = '';
            
            let count = 0;
            for (const [id, data] of Object.entries(servers)) {
                count++;
                const isFlagged = data.flags && data.flags !== "Clean";
                const card = document.createElement('div');
                card.className = `card ${isFlagged ? 'flagged' : ''}`;
                
                card.innerHTML = `
                    <span class="status-badge ${data.shouldKick ? 'status-kicked' : 'status-active'}">
                        ${data.shouldKick ? 'Kicked' : 'Running'}
                    </span>
                    <span style="font-size: 12px; color: var(--text-dim)">Instance ID</span>
                    <span class="job-id">${id}</span>
                    <div class="player-count">${data.playerCount} Players</div>
                    <div class="flag-text">${isFlagged ? '⚠ FLAGS: ' + data.flags : '✓ Explorer Clean'}</div>
                    <button class="btn-danger" onclick="trigger('${id}', 'kick-server')">TERMINATE</button>
                    <button class="btn-success" onclick="trigger('${id}', 'reset-server')">REVIVE</button>
                `;
                grid.appendChild(card);
            }
            document.getElementById('server-count').innerText = `${count} servers currently reporting.`;
        }

        async function trigger(jobId, endpoint) {
            await apiCall('/' + endpoint, 'POST', { jobId });
            log(`Signal sent: ${endpoint} for ${jobId.substring(0,8)}...`);
            refresh();
        }
    </script>
</body>
</html>
