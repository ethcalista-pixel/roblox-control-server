<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Nexus Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #D9D9D7;
            --s0:        #E4E4E2;
            --s1:        #EAEAE8;
            --s2:        #D2D2D0;
            --s3:        #C8C8C6;
            --b0:        #BFBFBD;
            --b1:        #ADADAB;
            --b2:        #909090;
            --ink:       #111110;
            --ink2:      #333331;
            --ink3:      #666664;
            --ink4:      #999997;
            --ink5:      #B8B8B6;
            --red:       #B52B1E;
            --red-bg:    rgba(181,43,30,0.09);
            --green:     #1A7040;
            --green-bg:  rgba(26,112,64,0.09);
            --amber:     #A05C00;
            --amber-bg:  rgba(160,92,0,0.09);
            --r:         5px;
            --body:      'Outfit', sans-serif;
            --mono:      'JetBrains Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: var(--body); background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; }

        /* ───────────────────────────────
           AUTH
        ─────────────────────────────── */
        #auth-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-card {
            width: 100%;
            max-width: 380px;
            background: var(--s1);
            border: 1px solid var(--b0);
            border-radius: 10px;
            padding: 44px 36px 36px;
            box-shadow: 0 2px 4px rgba(0,0,0,.06), 0 12px 40px rgba(0,0,0,.10);
            animation: up .35s cubic-bezier(.16,1,.3,1);
        }

        .auth-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }

        .auth-logo-mark {
            width: 34px; height: 34px;
            background: var(--ink);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-logo-mark svg { width: 16px; height: 16px; fill: var(--s1); }

        .auth-logo-name {
            font-size: 17px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: -.2px;
        }

        .auth-logo-sub {
            font-size: 12px;
            font-weight: 400;
            color: var(--ink4);
            margin-top: 1px;
        }

        .auth-heading {
            font-size: 22px;
            font-weight: 600;
            color: var(--ink);
            letter-spacing: -.3px;
            margin-bottom: 6px;
        }

        .auth-desc {
            font-size: 13px;
            color: var(--ink4);
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .field-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--ink3);
            margin-bottom: 7px;
            display: block;
        }

        .auth-input {
            width: 100%;
            padding: 11px 14px;
            background: var(--s2);
            border: 1.5px solid var(--b0);
            border-radius: var(--r);
            color: var(--ink);
            font-family: var(--mono);
            font-size: 13px;
            letter-spacing: 4px;
            outline: none;
            transition: border-color .18s, box-shadow .18s;
            margin-bottom: 14px;
        }

        .auth-input::placeholder { letter-spacing: 2px; color: var(--b1); }
        .auth-input:focus { border-color: var(--ink); box-shadow: 0 0 0 3px rgba(17,17,16,.09); }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: var(--ink);
            border: none;
            border-radius: var(--r);
            color: var(--s1);
            font-family: var(--body);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .18s, transform .15s;
        }

        .auth-btn:hover  { opacity: .85; transform: translateY(-1px); }
        .auth-btn:active { transform: translateY(0); opacity: .95; }

        /* ───────────────────────────────
           DASHBOARD
        ─────────────────────────────── */
        #dashboard {
            display: none;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* TOPBAR */
        .topbar {
            height: 52px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 18px;
            background: var(--s1);
            border-bottom: 1px solid var(--b0);
            flex-shrink: 0;
            z-index: 100;
        }

        .t-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-right: 6px;
        }

        .t-mark {
            width: 26px; height: 26px;
            background: var(--ink);
            border-radius: 5px;
            display: flex; align-items: center; justify-content: center;
        }

        .t-mark svg { width: 12px; height: 12px; fill: var(--s1); }

        .t-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: -.2px;
        }

        .sep { width: 1px; height: 18px; background: var(--b0); flex-shrink: 0; }

        .stat-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 11px;
            background: var(--s0);
            border: 1px solid var(--b0);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            color: var(--ink3);
            white-space: nowrap;
        }

        .stat-pill b { font-weight: 700; color: var(--ink); }

        .pulse {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--green);
            animation: breathe 2.5s ease-in-out infinite;
        }

        .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

        .tabs {
            display: flex;
            gap: 2px;
            background: var(--s0);
            border: 1px solid var(--b0);
            border-radius: 7px;
            padding: 3px;
        }

        .tab {
            padding: 5px 15px;
            border: none;
            border-radius: 5px;
            background: transparent;
            font-family: var(--body);
            font-size: 13px;
            font-weight: 500;
            color: var(--ink4);
            cursor: pointer;
            transition: all .18s;
        }

        .tab.on {
            background: var(--s1);
            color: var(--ink);
            font-weight: 600;
            box-shadow: 0 1px 3px rgba(0,0,0,.08);
        }

        .icon-btn {
            width: 34px; height: 34px;
            background: var(--s0);
            border: 1px solid var(--b0);
            border-radius: 6px;
            color: var(--ink3);
            font-size: 15px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all .15s;
        }

        .icon-btn:hover { background: var(--s2); color: var(--ink); }

        /* ───────────────────────────────
           WORKSPACE
        ─────────────────────────────── */
        .workspace {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* SERVER PANE */
        .server-pane {
            flex: 1;
            overflow-y: auto;
            padding: 18px;
        }

        .server-pane::-webkit-scrollbar { width: 5px; }
        .server-pane::-webkit-scrollbar-thumb { background: var(--b1); border-radius: 3px; }

        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--ink4);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 12px;
        }

        /* SERVER CARD */
        .card {
            background: var(--s1);
            border: 1px solid var(--b0);
            border-radius: 8px;
            padding: 18px;
            cursor: pointer;
            transition: border-color .18s, box-shadow .18s, transform .15s;
            animation: up .3s cubic-bezier(.16,1,.3,1) both;
            position: relative;
            overflow: hidden;
        }

        .card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: transparent;
            transition: background .2s;
        }

        .card:hover {
            border-color: var(--b1);
            box-shadow: 0 2px 8px rgba(0,0,0,.08), 0 1px 3px rgba(0,0,0,.05);
            transform: translateY(-1px);
        }

        .card.on {
            border-color: var(--ink2);
            box-shadow: 0 0 0 2px var(--ink2);
        }

        .card.on::after { background: var(--ink); }

        .card.flash { animation: flashCard 2s ease forwards; }

        .card-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .card-id {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--ink5);
            letter-spacing: .3px;
        }

        .badge {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: .8px;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .badge-live   { background: var(--green-bg); color: var(--green); }
        .badge-studio { background: var(--amber-bg); color: var(--amber); }

        .big-num {
            font-size: 52px;
            font-weight: 700;
            line-height: 1;
            color: var(--ink);
            letter-spacing: -2px;
            margin-bottom: 2px;
        }

        .big-label {
            font-size: 12px;
            font-weight: 400;
            color: var(--ink4);
            margin-bottom: 16px;
        }

        /* Player list */
        .players {
            border-top: 1px solid var(--b0);
            padding-top: 13px;
            margin-bottom: 14px;
        }

        .players-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--ink5);
            margin-bottom: 9px;
        }

        .p-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 3.5px 0;
        }

        .p-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--green);
            flex-shrink: 0;
        }

        .p-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--ink2);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .p-more { font-size: 11px; color: var(--ink5); padding-top: 3px; }
        .p-none { font-size: 12px; color: var(--ink5); }

        /* Card buttons */
        .card-btns {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            border-top: 1px solid var(--b0);
            padding-top: 13px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            border-radius: 5px;
            border: 1px solid transparent;
            font-family: var(--body);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all .14s;
            white-space: nowrap;
        }

        .btn-ghost {
            background: var(--s0);
            border-color: var(--b0);
            color: var(--ink3);
        }

        .btn-ghost:hover { background: var(--s2); border-color: var(--b1); color: var(--ink); }

        .btn-dark {
            background: var(--ink);
            border-color: var(--ink);
            color: var(--s1);
        }

        .btn-dark:hover { opacity: .8; }

        .btn-red {
            background: var(--red-bg);
            border-color: rgba(181,43,30,.2);
            color: var(--red);
        }

        .btn-red:hover { background: var(--red); border-color: var(--red); color: white; }

        .card-hint {
            font-family: var(--mono);
            font-size: 9px;
            color: var(--ink5);
            text-align: right;
            margin-top: 9px;
            letter-spacing: .5px;
        }

        /* ───────────────────────────────
           CHAT PANEL
        ─────────────────────────────── */
        .chat-panel {
            width: 360px;
            flex-shrink: 0;
            border-left: 1px solid var(--b0);
            background: var(--s0);
            display: flex;
            flex-direction: column;
        }

        .panel-head {
            padding: 14px 16px;
            border-bottom: 1px solid var(--b0);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            background: var(--s1);
        }

        .panel-mode {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--ink5);
            margin-bottom: 2px;
        }

        .panel-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--ink);
            letter-spacing: -.2px;
        }

        .panel-close {
            display: none;
            width: 28px; height: 28px;
            background: var(--s2);
            border: 1px solid var(--b0);
            border-radius: 5px;
            color: var(--ink3);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            transition: all .15s;
        }

        .panel-close:hover { background: var(--s3); color: var(--ink); }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .chat-body::-webkit-scrollbar { width: 4px; }
        .chat-body::-webkit-scrollbar-thumb { background: var(--b1); border-radius: 2px; }

        .msg {
            padding: 8px 10px;
            border-radius: 6px;
            border-left: 2px solid transparent;
            transition: background .13s;
        }

        .msg:hover { background: var(--s1); }
        .msg.g-msg { border-left-color: var(--b2); }
        .msg.i-msg { border-left-color: var(--green); }

        .msg-meta {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 3px;
        }

        .srv-tag {
            font-family: var(--mono);
            font-size: 9px;
            font-weight: 500;
            background: rgba(17,17,16,.07);
            color: var(--ink2);
            padding: 2px 6px;
            border-radius: 3px;
            cursor: pointer;
            transition: all .13s;
            letter-spacing: .5px;
        }

        .srv-tag:hover { background: var(--ink); color: var(--s1); }

        .msg-time {
            font-family: var(--mono);
            font-size: 9px;
            color: var(--ink5);
        }

        .msg-text {
            font-size: 12.5px;
            color: var(--ink2);
            line-height: 1.5;
            word-break: break-word;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 40px;
            text-align: center;
        }

        .es-icon  { font-size: 28px; opacity: .25; margin-bottom: 4px; }
        .es-title { font-size: 13px; font-weight: 600; color: var(--ink3); }
        .es-sub   { font-size: 12px; color: var(--ink5); }

        /* ───────────────────────────────
           VAULT
        ─────────────────────────────── */
        #vault-view {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 18px;
        }

        #vault-view::-webkit-scrollbar { width: 5px; }
        #vault-view::-webkit-scrollbar-thumb { background: var(--b1); border-radius: 3px; }

        .vault-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 12px;
        }

        .arc-card {
            background: var(--s1);
            border: 1px solid var(--b0);
            border-radius: 8px;
            padding: 18px;
            animation: up .3s cubic-bezier(.16,1,.3,1) both;
        }

        .arc-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 14px;
        }

        .arc-name {
            font-size: 17px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: -.2px;
        }

        .arc-btns { display: flex; gap: 6px; flex-shrink: 0; }

        .arc-log {
            background: var(--s2);
            border: 1px solid var(--b0);
            border-radius: 5px;
            padding: 11px 12px;
            height: 155px;
            overflow-y: auto;
            font-family: var(--mono);
            font-size: 10px;
            line-height: 1.85;
            color: var(--ink3);
        }

        .arc-log::-webkit-scrollbar { width: 3px; }
        .arc-log::-webkit-scrollbar-thumb { background: var(--b1); }
        .arc-t { color: var(--ink5); }

        .empty-grid {
            grid-column: 1/-1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 70px 0;
            gap: 8px;
        }

        /* ───────────────────────────────
           MOBILE
        ─────────────────────────────── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(17,17,16,.3);
            z-index: 199;
            opacity: 0;
            transition: opacity .25s;
        }

        .overlay.show { opacity: 1; }

        .fab {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px; height: 50px;
            border-radius: 50%;
            background: var(--ink);
            color: var(--s1);
            border: none;
            box-shadow: 0 4px 16px rgba(0,0,0,.18);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 19px;
            z-index: 150;
            transition: transform .15s;
        }

        .fab:active { transform: scale(.93); }

        /* ───────────────────────────────
           ANIMATIONS
        ─────────────────────────────── */
        @keyframes up {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes breathe {
            0%, 100% { opacity: 1; }
            50%       { opacity: .35; }
        }

        @keyframes flashCard {
            0%   { border-color: var(--b0); box-shadow: none; }
            15%  { border-color: var(--ink); box-shadow: 0 0 0 2px var(--ink); }
            70%  { border-color: var(--b1); box-shadow: 0 0 0 1px var(--b1); }
            100% { border-color: var(--b0); box-shadow: none; }
        }

        /* ───────────────────────────────
           RESPONSIVE
        ─────────────────────────────── */
        @media (max-width: 1024px) {
            .chat-panel { width: 310px; }
        }

        @media (max-width: 768px) {
            .topbar { padding: 0 14px; gap: 8px; }
            .stat-pill.xs-hide { display: none; }
            .sep { display: none; }

            .server-pane { padding: 14px; }
            .grid { grid-template-columns: 1fr; }

            .chat-panel {
                position: fixed;
                inset: auto 0 0 0;
                width: 100%;
                height: 68vh;
                border-left: none;
                border-top: 1.5px solid var(--b0);
                border-radius: 14px 14px 0 0;
                box-shadow: 0 -6px 30px rgba(0,0,0,.12);
                transform: translateY(100%);
                transition: transform .3s cubic-bezier(.16,1,.3,1);
                z-index: 200;
            }

            .chat-panel.open { transform: translateY(0); }
            .panel-close { display: flex; }
            .overlay { display: block; }
            .fab { display: flex; }

            #vault-view { padding: 14px; }
            .vault-grid { grid-template-columns: 1fr; }
            .arc-top { flex-wrap: wrap; }
        }

        @media (max-width: 420px) {
            .auth-card { padding: 32px 22px 28px; }
            .big-num { font-size: 44px; }
        }
    </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-wrap">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-mark">
                <svg viewBox="0 0 16 16"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
            </div>
            <div>
                <div class="auth-logo-name">Nexus</div>
                <div class="auth-logo-sub">Command Center</div>
            </div>
        </div>
        <div class="auth-heading">Sign in</div>
        <div class="auth-desc">Enter your system key to access the dashboard.</div>
        <label class="field-label" for="key-input">System Key</label>
        <input class="auth-input" type="password" id="key-input" placeholder="••••••••" autocomplete="off" onkeydown="if(event.key==='Enter')login()">
        <button class="auth-btn" onclick="login()">Continue →</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
    <div class="topbar">
        <div class="t-logo">
            <div class="t-mark">
                <svg viewBox="0 0 16 16"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
            </div>
            <span class="t-name">Nexus</span>
        </div>
        <div class="sep"></div>
        <div class="stat-pill"><div class="pulse"></div><b id="s-count">0</b> servers</div>
        <div class="stat-pill xs-hide"><b id="p-count">0</b> players</div>
        <div class="stat-pill xs-hide"><b id="a-count">0</b> archived</div>
        <div class="topbar-right">
            <div class="tabs">
                <button class="tab on" id="tab-live" onclick="switchTab('live')">Live</button>
                <button class="tab" id="tab-vault" onclick="switchTab('vault')">Vault</button>
            </div>
            <button class="icon-btn" title="Log out" onclick="location.reload()">⏻</button>
        </div>
    </div>

    <div id="live-view" class="workspace">
        <div class="server-pane">
            <div class="section-head">
                <span class="section-title">Active Instances</span>
            </div>
            <div class="grid" id="server-grid">
                <div style="grid-column:1/-1;padding:64px 0;text-align:center;">
                    <div class="es-icon">◌</div>
                    <div class="es-title">Connecting…</div>
                </div>
            </div>
        </div>

        <div class="chat-panel" id="chat-panel">
            <div class="panel-head">
                <div>
                    <div class="panel-mode" id="panel-mode">Global Feed</div>
                    <div class="panel-name" id="panel-name">All Instances</div>
                </div>
                <button class="panel-close" onclick="closeMobile()">✕</button>
            </div>
            <div class="chat-body" id="chat-body">
                <div class="empty-state">
                    <div class="es-icon">◌</div>
                    <div class="es-title">Waiting for messages</div>
                    <div class="es-sub">Activity will show up here</div>
                </div>
            </div>
        </div>
    </div>

    <div id="vault-view">
        <div class="vault-grid" id="archive-grid"></div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeMobile()"></div>
<button class="fab" id="fab" onclick="openMobile()">💬</button>

<script>
    let apiKey = "", masterData = { servers:{}, global:[], archives:{} }, sel = null;

    function login() {
        apiKey = document.getElementById('key-input').value.trim();
        if (!apiKey) return;
        document.getElementById('auth-wrap').style.display = 'none';
        const d = document.getElementById('dashboard');
        d.style.display = 'flex';
        refresh();
        setInterval(refresh, 3000);
    }

    function switchTab(t) {
        document.getElementById('tab-live').classList.toggle('on', t==='live');
        document.getElementById('tab-vault').classList.toggle('on', t==='vault');
        document.getElementById('live-view').style.display  = t==='live'  ? 'flex'  : 'none';
        document.getElementById('vault-view').style.display = t==='vault' ? 'block' : 'none';
    }

    function openMobile() {
        document.getElementById('chat-panel').classList.add('open');
        const ov = document.getElementById('overlay');
        ov.style.display = 'block';
        requestAnimationFrame(() => ov.classList.add('show'));
    }

    function closeMobile() {
        document.getElementById('chat-panel').classList.remove('open');
        const ov = document.getElementById('overlay');
        ov.classList.remove('show');
        setTimeout(() => ov.style.display = 'none', 260);
    }

    function selectServer(id) {
        sel = (sel === id) ? null : id;
        document.querySelectorAll('.card').forEach(c => c.classList.toggle('on', c.dataset.sid === sel));
        renderPanel();
        if (sel && window.innerWidth <= 768) openMobile();
    }

    function scrollToServer(id) {
        switchTab('live');
        setTimeout(() => {
            const el = document.getElementById('card-' + id);
            if (!el) return;
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            el.classList.add('flash');
            setTimeout(() => el.classList.remove('flash'), 2000);
        }, 60);
    }

    function renderPanel() {
        const body = document.getElementById('chat-body');
        const mode = document.getElementById('panel-mode');
        const name = document.getElementById('panel-name');

        if (!sel || !masterData.servers[sel]) {
            mode.textContent = 'Global Feed';
            name.textContent = 'All Instances';
            const msgs = masterData.global || [];
            if (!msgs.length) { body.innerHTML = emptyHTML('◌','No activity yet','Messages will show up here'); return; }
            body.innerHTML = [...msgs].reverse().map(c => `
                <div class="msg g-msg">
                    <div class="msg-meta">
                        <span class="srv-tag" onclick="scrollToServer('${esc(c.jobId)}')">${esc(c.jobId.substring(0,8))}</span>
                        <span class="msg-time">${esc(c.t)}</span>
                    </div>
                    <div class="msg-text">${esc(c.msg)}</div>
                </div>`).join('');
        } else {
            const s = masterData.servers[sel];
            mode.textContent = 'Instance';
            name.textContent = sel.substring(0,14) + '…';
            const msgs = s.chats || [];
            if (!msgs.length) { body.innerHTML = emptyHTML('◌','No logs yet','Chat will appear as players talk'); return; }
            body.innerHTML = [...msgs].reverse().map(c => `
                <div class="msg i-msg">
                    <div class="msg-meta"><span class="msg-time">${esc(c.t)}</span></div>
                    <div class="msg-text">${esc(c.msg)}</div>
                </div>`).join('');
        }
    }

    function emptyHTML(icon, title, sub) {
        return `<div class="empty-state"><div class="es-icon">${icon}</div><div class="es-title">${title}</div><div class="es-sub">${sub}</div></div>`;
    }

    async function refresh() {
        try {
            const res = await fetch('/list-servers', { headers: { 'x-api-key': apiKey } });
            if (res.status === 401) { location.reload(); return; }
            masterData = await res.json();
        } catch(e) { return; }

        const servers  = Object.entries(masterData.servers  || {});
        const archives = Object.entries(masterData.archives || {});
        document.getElementById('s-count').textContent = servers.length;
        document.getElementById('p-count').textContent = servers.reduce((a,[,s]) => a+(s.playerCount||0), 0);
        document.getElementById('a-count').textContent = archives.length;

        const grid = document.getElementById('server-grid');
        const existing = new Set([...grid.querySelectorAll('.card')].map(e => e.dataset.sid));
        const incoming = new Set(servers.map(([id]) => id));
        existing.forEach(id => { if (!incoming.has(id)) document.getElementById('card-'+id)?.remove(); });

        if (!servers.length) {
            grid.innerHTML = `<div style="grid-column:1/-1;padding:64px 0;text-align:center;"><div class="es-icon">◌</div><div class="es-title">No active servers</div><div class="es-sub">Waiting for instances to connect</div></div>`;
        } else {
            grid.querySelector('[style*="grid-column"]')?.remove();
            servers.forEach(([id, s], i) => {
                const MAX = 5;
                const players = Array.isArray(s.players) ? s.players : [];
                const shown   = players.slice(0, MAX);
                const extra   = Math.max(0, (s.playerCount||players.length) - shown.length);
                const isSel   = sel === id;

                const playerHTML = shown.length
                    ? shown.map(p => `<div class="p-row"><div class="p-dot"></div><span class="p-name">${esc(p.name||p)}</span></div>`).join('')
                      + (extra ? `<div class="p-more">+${extra} more</div>` : '')
                    : `<div class="p-none">${s.playerCount > 0 ? s.playerCount + ' player' + (s.playerCount!==1?'s':'') + ' online' : 'Nobody here yet'}</div>`;

                let card = document.getElementById('card-'+id);
                if (!card) {
                    card = document.createElement('div');
                    card.className = 'card';
                    card.id = 'card-'+id;
                    card.dataset.sid = id;
                    card.style.animationDelay = `${i*35}ms`;
                    grid.appendChild(card);
                }
                card.classList.toggle('on', isSel);
                card.onclick = e => { if (!e.target.closest('.btn')) selectServer(id); };
                card.innerHTML = `
                    <div class="card-row">
                        <span class="card-id">${esc(id.substring(0,18))}…</span>
                        <span class="badge ${s.isStudio?'badge-studio':'badge-live'}">${s.isStudio?'Studio':'Live'}</span>
                    </div>
                    <div class="big-num">${s.playerCount}</div>
                    <div class="big-label">player${s.playerCount!==1?'s':''} online</div>
                    <div class="players">
                        <div class="players-label">In session</div>
                        ${playerHTML}
                    </div>
                    <div class="card-btns">
                        <button class="btn btn-red" onclick="terminate('${id}')">Terminate</button>
                        <button class="btn btn-ghost" onclick="archiveServer('${id}')">Archive</button>
                        <button class="btn btn-ghost" onclick="downloadTxt('${id}',masterData.servers['${id}'].chats,'Log_${id.substring(0,8)}')">Download</button>
                    </div>
                    <div class="card-hint">${isSel ? '▲ viewing logs' : '▼ tap to view logs'}</div>`;
            });
        }

        const arcGrid = document.getElementById('archive-grid');
        arcGrid.innerHTML = '';
        if (!archives.length) {
            arcGrid.innerHTML = `<div class="empty-grid"><div class="es-icon" style="font-size:28px;opacity:.25">◫</div><div class="es-title">No archives yet</div><div class="es-sub">Archive a live session to save its logs</div></div>`;
        } else {
            archives.forEach(([id, a]) => {
                const d = document.createElement('div');
                d.className = 'arc-card';
                d.innerHTML = `
                    <div class="arc-top">
                        <div class="arc-name">${esc(a.name)}</div>
                        <div class="arc-btns">
                            <button class="btn btn-ghost" onclick="downloadTxt('${a.jobId}',masterData.archives['${id}'].chats,'Archive_${esc(a.name)}')">Download</button>
                            <button class="btn btn-red" onclick="deleteArchive('${id}')">Purge</button>
                        </div>
                    </div>
                    <div class="arc-log">${(a.chats||[]).map(c=>`<div><span class="arc-t">[${esc(c.t)}]</span> ${esc(c.msg)}</div>`).join('')||'<span style="opacity:.4">No logs</span>'}</div>`;
                arcGrid.appendChild(d);
            });
        }

        renderPanel();
    }

    function esc(s) {
        return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function downloadTxt(jobId, chats, fileName) {
        if (!chats?.length) return alert('No logs to export.');
        let txt = `Nexus Command — Log Export\nInstance: ${jobId}\n${'─'.repeat(44)}\n\n`;
        chats.forEach(c => txt += `[${c.t}]  ${c.msg}\n`);
        Object.assign(document.createElement('a'), {
            href: URL.createObjectURL(new Blob([txt], {type:'text/plain'})),
            download: fileName+'.txt'
        }).click();
    }

    async function archiveServer(id) {
        const name = prompt('Name this archive:');
        if (!name?.trim()) return;
        await fetch('/archive-session', { method:'POST', headers:{'x-api-key':apiKey,'Content-Type':'application/json'}, body:JSON.stringify({jobId:id,customName:name.trim()}) });
        refresh();
    }

    async function terminate(id) {
        if (!confirm('Terminate this server?')) return;
        await fetch('/kick-server', { method:'POST', headers:{'x-api-key':apiKey,'Content-Type':'application/json'}, body:JSON.stringify({jobId:id}) });
        if (sel===id) { sel=null; renderPanel(); }
        refresh();
    }

    async function deleteArchive(id) {
        if (!confirm('Permanently purge this archive?')) return;
        await fetch('/delete-archive', { method:'POST', headers:{'x-api-key':apiKey,'Content-Type':'application/json'}, body:JSON.stringify({archiveId:id}) });
        refresh();
    }
</script>
</body>
</html>
