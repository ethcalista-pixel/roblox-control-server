<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Command</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060912;
            --surface: #0d1117;
            --surface2: #161b22;
            --border: rgba(99, 200, 255, 0.1);
            --border-strong: rgba(99, 200, 255, 0.25);
            --primary: #63c8ff;
            --primary-dim: rgba(99, 200, 255, 0.15);
            --danger: #ff4757;
            --danger-dim: rgba(255, 71, 87, 0.15);
            --success: #2ed573;
            --success-dim: rgba(46, 213, 115, 0.12);
            --purple: #a78bfa;
            --purple-dim: rgba(167, 139, 250, 0.15);
            --warn: #ffa502;
            --text: #8b9ab5;
            --text-bright: #dde6f5;
            --text-dim: #4a5568;
            --mono: 'JetBrains Mono', monospace;
            --display: 'Syne', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--mono);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Subtle scanlines overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
            pointer-events: none;
            z-index: 9999;
        }

        /* ─── AUTH ─── */
        #auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .auth-box {
            width: 380px;
            padding: 50px 40px;
            background: var(--surface);
            border: 1px solid var(--border-strong);
            border-radius: 4px;
            position: relative;
            animation: fadeUp 0.4s ease;
        }
        .auth-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }
        .auth-title {
            font-family: var(--display);
            font-size: 28px;
            color: var(--text-bright);
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .auth-sub {
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 35px;
        }
        .auth-input {
            width: 100%;
            padding: 13px 16px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border-strong);
            border-radius: 3px;
            color: var(--primary);
            font-family: var(--mono);
            font-size: 13px;
            letter-spacing: 4px;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .auth-input:focus { border-color: var(--primary); }
        .auth-btn {
            width: 100%;
            padding: 13px;
            background: var(--primary-dim);
            border: 1px solid var(--primary);
            border-radius: 3px;
            color: var(--primary);
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }
        .auth-btn:hover { background: var(--primary); color: var(--bg); }

        /* ─── DASHBOARD ─── */
        #dashboard { display: none; height: 100vh; flex-direction: column; }

        .topbar {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 14px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .topbar-logo {
            font-family: var(--display);
            font-size: 18px;
            color: var(--text-bright);
            letter-spacing: 1px;
            margin-right: 10px;
        }
        .topbar-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: pulse 2s infinite;
        }
        .stat-pill {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 11px;
            color: var(--text);
        }
        .stat-pill span { color: var(--text-bright); font-weight: 700; }

        .nav-tabs { display: flex; gap: 2px; margin-left: auto; }
        .tab-btn {
            background: none;
            border: 1px solid transparent;
            color: var(--text-dim);
            padding: 8px 20px;
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s;
        }
        .tab-btn:hover { color: var(--text); border-color: var(--border); }
        .tab-btn.active { color: var(--primary); background: var(--primary-dim); border-color: var(--primary); }
        .logout-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 8px 16px;
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s;
        }
        .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

        /* ─── MAIN LAYOUT ─── */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ─── SERVER GRID ─── */
        .server-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            grid-auto-rows: min-content;
            gap: 16px;
            align-content: start;
        }
        .server-list::-webkit-scrollbar { width: 4px; }
        .server-list::-webkit-scrollbar-track { background: transparent; }
        .server-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

        .server-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 20px;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
            position: relative;
            animation: fadeUp 0.3s ease;
        }
        .server-card:hover {
            border-color: var(--border-strong);
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .server-card.selected {
            border-color: var(--primary);
            box-shadow: 0 0 0 1px var(--primary), 0 0 25px rgba(99, 200, 255, 0.1);
        }
        .server-card.highlight-flash {
            animation: flashCard 3s ease;
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .card-id {
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }
        .card-type-badge {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2px;
            padding: 3px 8px;
            border-radius: 2px;
        }
        .badge-live { background: var(--success-dim); color: var(--success); border: 1px solid rgba(46,213,115,0.3); }
        .badge-studio { background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(167,139,250,0.3); }

        .card-count {
            font-family: var(--display);
            font-size: 42px;
            color: var(--text-bright);
            line-height: 1;
            margin-bottom: 4px;
        }
        .card-count-label {
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        /* Player list */
        .player-list {
            margin-bottom: 16px;
        }
        .player-list-header {
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }
        .player-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            font-size: 11px;
            color: var(--text);
        }
        .player-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--success);
            flex-shrink: 0;
        }
        .player-name { color: var(--text-bright); }
        .player-overflow {
            font-size: 10px;
            color: var(--text-dim);
            padding: 4px 0;
        }

        /* Card actions */
        .card-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 6px 12px;
            border-radius: 3px;
            border: 1px solid transparent;
            font-size: 10px;
            font-family: var(--mono);
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-danger {
            background: var(--danger-dim);
            border-color: rgba(255,71,87,0.3);
            color: var(--danger);
        }
        .btn-danger:hover { background: var(--danger); color: white; }
        .btn-success {
            background: var(--success-dim);
            border-color: rgba(46,213,115,0.3);
            color: var(--success);
        }
        .btn-success:hover { background: var(--success); color: var(--bg); }
        .btn-ghost {
            background: var(--surface2);
            border-color: var(--border);
            color: var(--text);
        }
        .btn-ghost:hover { border-color: var(--border-strong); color: var(--text-bright); }

        /* View chat button */
        .view-chat-hint {
            font-size: 9px;
            color: var(--primary);
            letter-spacing: 1px;
            opacity: 0.7;
            margin-top: 10px;
            text-align: right;
        }

        /* ─── RIGHT PANEL ─── */
        .right-panel {
            width: 400px;
            flex-shrink: 0;
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: var(--surface);
        }

        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .panel-title {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 4px;
        }
        .panel-subtitle {
            font-size: 12px;
            color: var(--text-bright);
            font-weight: 500;
        }

        .chat-feed {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .chat-feed::-webkit-scrollbar { width: 3px; }
        .chat-feed::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

        .chat-msg {
            padding: 8px 10px;
            border-radius: 3px;
            font-size: 11px;
            line-height: 1.6;
            border-left: 2px solid transparent;
            transition: background 0.15s;
        }
        .chat-msg:hover { background: var(--surface2); }
        .chat-msg.global-entry { border-left-color: var(--primary); }
        .chat-msg.instance-entry { border-left-color: var(--success); }

        .msg-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 3px;
        }
        .msg-server-tag {
            font-size: 9px;
            background: var(--primary-dim);
            color: var(--primary);
            padding: 1px 6px;
            border-radius: 2px;
            cursor: pointer;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .msg-server-tag:hover { background: var(--primary); color: var(--bg); }
        .msg-time {
            font-size: 9px;
            color: var(--text-dim);
        }
        .msg-text { color: var(--text); font-size: 11px; }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--text-dim);
        }
        .empty-icon {
            font-size: 32px;
            opacity: 0.3;
        }
        .empty-label {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ─── VAULT TAB ─── */
        #vault-view {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        #vault-view::-webkit-scrollbar { width: 4px; }
        #vault-view::-webkit-scrollbar-thumb { background: var(--border-strong); }

        .vault-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 16px;
            align-content: start;
        }

        .archive-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 20px;
            animation: fadeUp 0.3s ease;
        }
        .archive-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .archive-name {
            font-family: var(--display);
            font-size: 18px;
            color: var(--text-bright);
        }
        .archive-actions { display: flex; gap: 6px; }
        .archive-log {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 12px;
            height: 160px;
            overflow-y: auto;
            font-size: 10px;
            line-height: 1.8;
            color: var(--text-dim);
        }
        .archive-log::-webkit-scrollbar { width: 3px; }
        .archive-log::-webkit-scrollbar-thumb { background: var(--border-strong); }

        /* ─── ANIMATIONS ─── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        @keyframes flashCard {
            0%, 100% { border-color: var(--border); box-shadow: none; }
            10%, 50% { border-color: var(--primary); box-shadow: 0 0 20px rgba(99,200,255,0.25); }
        }

        /* Vault empty */
        .vault-empty {
            grid-column: 1/-1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 80px 0;
            color: var(--text-dim);
        }
        .vault-empty .empty-icon { font-size: 40px; opacity: 0.2; }
        .vault-empty .empty-label { font-size: 11px; letter-spacing: 3px; }
    </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-container">
    <div class="auth-box">
        <div class="auth-title">Nexus Command</div>
        <div class="auth-sub">Secure Operations Center</div>
        <input class="auth-input" type="password" id="key-input" placeholder="••••••••••••" autocomplete="off">
        <button class="auth-btn" onclick="login()">Authorize Access</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

    <!-- TOP BAR -->
    <div class="topbar">
        <span class="topbar-dot"></span>
        <span class="topbar-logo">Nexus</span>

        <div class="stat-pill" id="stat-servers">Servers <span id="s-count">0</span></div>
        <div class="stat-pill" id="stat-players">Players <span id="p-count">0</span></div>
        <div class="stat-pill" id="stat-archives">Archives <span id="a-count">0</span></div>

        <div class="nav-tabs" style="margin-left: auto;">
            <button class="tab-btn active" id="tab-live" onclick="switchTab('live')">Live Monitor</button>
            <button class="tab-btn" id="tab-vault" onclick="switchTab('vault')">Vault</button>
        </div>
        <button class="logout-btn" onclick="location.reload()">Logout</button>
    </div>

    <!-- LIVE VIEW -->
    <div id="live-view" class="workspace">
        <div class="server-list" id="server-grid"></div>

        <!-- RIGHT PANEL -->
        <div class="right-panel">
            <div class="panel-header">
                <div class="panel-title" id="panel-mode-label">Global Feed</div>
                <div class="panel-subtitle" id="panel-instance-label">All Instances</div>
            </div>
            <div class="chat-feed" id="chat-panel">
                <div class="empty-state">
                    <div class="empty-icon">◈</div>
                    <div class="empty-label">Loading feed...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- VAULT VIEW -->
    <div id="vault-view">
        <div class="vault-grid" id="archive-grid"></div>
    </div>

</div>

<script>
    let apiKey = "";
    let masterData = { servers: {}, global: [], archives: {} };
    let selectedServer = null; // null = global feed

    function login() {
        apiKey = document.getElementById('key-input').value;
        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('dashboard').style.display = 'flex';
        document.getElementById('dashboard').style.flexDirection = 'column';
        refresh();
        setInterval(refresh, 3000);
    }

    function switchTab(t) {
        document.getElementById('tab-live').classList.toggle('active', t === 'live');
        document.getElementById('tab-vault').classList.toggle('active', t === 'vault');
        document.getElementById('live-view').style.display = t === 'live' ? 'flex' : 'none';
        document.getElementById('vault-view').style.display = t === 'live' ? 'none' : 'block';
    }

    function selectServer(id) {
        selectedServer = (selectedServer === id) ? null : id; // toggle
        renderPanel();
        // update card selection highlight
        document.querySelectorAll('.server-card').forEach(c => c.classList.remove('selected'));
        if (selectedServer) {
            const el = document.getElementById('card-' + selectedServer);
            if (el) el.classList.add('selected');
        }
    }

    function renderPanel() {
        const panel = document.getElementById('chat-panel');
        const modeLabel = document.getElementById('panel-mode-label');
        const instanceLabel = document.getElementById('panel-instance-label');

        if (!selectedServer || !masterData.servers[selectedServer]) {
            // Global feed
            modeLabel.textContent = 'Global Feed';
            instanceLabel.textContent = 'All Instances';
            const msgs = masterData.global || [];
            if (msgs.length === 0) {
                panel.innerHTML = `<div class="empty-state"><div class="empty-icon">◈</div><div class="empty-label">No activity yet</div></div>`;
                return;
            }
            panel.innerHTML = msgs.slice().reverse().map(c => `
                <div class="chat-msg global-entry">
                    <div class="msg-meta">
                        <span class="msg-server-tag" onclick="scrollToServer('${c.jobId}')">${c.jobId.substring(0,8)}</span>
                        <span class="msg-time">${c.t}</span>
                    </div>
                    <div class="msg-text">${escHtml(c.msg)}</div>
                </div>
            `).join('');
        } else {
            // Instance-specific chat
            const s = masterData.servers[selectedServer];
            const shortId = selectedServer.substring(0, 8);
            modeLabel.textContent = 'Instance Feed';
            instanceLabel.textContent = shortId + (s.isStudio ? ' · Studio' : ' · Live') + ' · ' + s.playerCount + ' player' + (s.playerCount !== 1 ? 's' : '');

            const msgs = s.chats || [];
            if (msgs.length === 0) {
                panel.innerHTML = `<div class="empty-state"><div class="empty-icon">◈</div><div class="empty-label">No logs for this instance</div></div>`;
                return;
            }
            panel.innerHTML = msgs.slice().reverse().map(c => `
                <div class="chat-msg instance-entry">
                    <div class="msg-meta">
                        <span class="msg-time">${c.t}</span>
                    </div>
                    <div class="msg-text">${escHtml(c.msg)}</div>
                </div>
            `).join('');
        }
    }

    function scrollToServer(id) {
        switchTab('live');
        setTimeout(() => {
            const el = document.getElementById('card-' + id);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                el.classList.add('highlight-flash');
                setTimeout(() => el.classList.remove('highlight-flash'), 3000);
            }
        }, 50);
    }

    function escHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function downloadTxt(jobId, chatArray, fileName) {
        if (!chatArray || chatArray.length === 0) return alert("No logs to download.");
        let content = `Nexus Command Log Export\nInstance: ${jobId}\n${'─'.repeat(40)}\n\n`;
        chatArray.forEach(c => content += `[${c.t}] ${c.msg}\n`);
        const blob = new Blob([content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `${fileName}.txt`; a.click();
    }

    async function refresh() {
        try {
            const res = await fetch('/list-servers', { headers: { 'x-api-key': apiKey } });
            if (res.status === 401) { location.reload(); return; }
            masterData = await res.json();
        } catch(e) { return; }

        // Update stat pills
        const servers = Object.entries(masterData.servers || {});
        let totalPlayers = servers.reduce((acc, [, s]) => acc + (s.playerCount || 0), 0);
        document.getElementById('s-count').textContent = servers.length;
        document.getElementById('p-count').textContent = totalPlayers;
        document.getElementById('a-count').textContent = Object.keys(masterData.archives || {}).length;

        // Render server cards
        const grid = document.getElementById('server-grid');
        const existingIds = new Set([...grid.querySelectorAll('.server-card')].map(el => el.dataset.sid));
        const incomingIds = new Set(servers.map(([id]) => id));

        // Remove cards no longer present
        existingIds.forEach(id => { if (!incomingIds.has(id)) document.getElementById('card-' + id)?.remove(); });

        servers.forEach(([id, s]) => {
            const MAX_SHOWN = 5;
            const players = s.players || [];
            const shownPlayers = players.slice(0, MAX_SHOWN);
            const extraCount = Math.max(0, (s.playerCount || players.length) - shownPlayers.length);

            const playerListHtml = shownPlayers.length > 0 ? `
                <div class="player-list">
                    <div class="player-list-header">Online Players</div>
                    ${shownPlayers.map(p => `
                        <div class="player-item">
                            <div class="player-dot"></div>
                            <span class="player-name">${escHtml(p.name || p)}</span>
                        </div>
                    `).join('')}
                    ${extraCount > 0 ? `<div class="player-overflow">+${extraCount} more</div>` : ''}
                </div>
            ` : `
                <div class="player-list">
                    <div class="player-list-header">Online Players</div>
                    <div class="player-overflow" style="padding:6px 0;">
                        ${s.playerCount > 0 ? s.playerCount + ' player' + (s.playerCount !== 1 ? 's' : '') + ' online' : 'No players'}
                    </div>
                </div>
            `;

            const isSelected = selectedServer === id;

            let card = document.getElementById('card-' + id);
            if (!card) {
                card = document.createElement('div');
                card.className = 'server-card';
                card.id = 'card-' + id;
                card.dataset.sid = id;
                grid.appendChild(card);
            }
            if (isSelected) card.classList.add('selected'); else card.classList.remove('selected');

            card.onclick = (e) => {
                // Don't trigger select if clicking a button
                if (e.target.closest('.btn')) return;
                selectServer(id);
            };

            card.innerHTML = `
                <div class="card-header">
                    <div class="card-id">${id.substring(0, 16)}…</div>
                    <div class="card-type-badge ${s.isStudio ? 'badge-studio' : 'badge-live'}">${s.isStudio ? 'STUDIO' : 'LIVE'}</div>
                </div>
                <div class="card-count">${s.playerCount}</div>
                <div class="card-count-label">Users Online</div>
                ${playerListHtml}
                <div class="card-actions">
                    <button class="btn btn-danger" onclick="terminate('${id}')">Terminate</button>
                    <button class="btn btn-success" onclick="archiveServer('${id}')">Archive</button>
                    <button class="btn btn-ghost" onclick="downloadTxt('${id}', masterData.servers['${id}'].chats, 'Log_${id.substring(0,8)}')">Download</button>
                </div>
                <div class="view-chat-hint">${isSelected ? '▲ Viewing logs' : '▼ Click to view logs'}</div>
            `;
        });

        // Render archive vault
        const arcGrid = document.getElementById('archive-grid');
        arcGrid.innerHTML = '';
        const archives = Object.entries(masterData.archives || {});
        if (archives.length === 0) {
            arcGrid.innerHTML = `<div class="vault-empty"><div class="empty-icon">◫</div><div class="empty-label">No archives yet</div></div>`;
        } else {
            archives.forEach(([id, a]) => {
                const div = document.createElement('div');
                div.className = 'archive-card';
                div.innerHTML = `
                    <div class="archive-card-header">
                        <div class="archive-name">${escHtml(a.name)}</div>
                        <div class="archive-actions">
                            <button class="btn btn-ghost" onclick="downloadTxt('${a.jobId}', masterData.archives['${id}'].chats, 'Archive_${escHtml(a.name)}')">Download</button>
                            <button class="btn btn-danger" onclick="deleteArchive('${id}')">Purge</button>
                        </div>
                    </div>
                    <div class="archive-log">
                        ${(a.chats || []).map(c => `<div><span style="color:var(--text-dim)">[${c.t}]</span> ${escHtml(c.msg)}</div>`).join('') || '<span style="opacity:0.4">No logs</span>'}
                    </div>
                `;
                arcGrid.appendChild(div);
            });
        }

        // Re-render panel if viewing an instance that might have new messages
        renderPanel();
    }

    async function archiveServer(id) {
        const name = prompt("Name this archive:");
        if (!name) return;
        await fetch('/archive-session', {
            method: 'POST',
            headers: { 'x-api-key': apiKey, 'Content-Type': 'application/json' },
            body: JSON.stringify({ jobId: id, customName: name })
        });
    }

    async function terminate(id) {
        await fetch('/kick-server', {
            method: 'POST',
            headers: { 'x-api-key': apiKey, 'Content-Type': 'application/json' },
            body: JSON.stringify({ jobId: id })
        });
        if (selectedServer === id) { selectedServer = null; renderPanel(); }
        refresh();
    }

    async function deleteArchive(id) {
        if (!confirm("Purge this archive? This cannot be undone.")) return;
        await fetch('/delete-archive', {
            method: 'POST',
            headers: { 'x-api-key': apiKey, 'Content-Type': 'application/json' },
            body: JSON.stringify({ archiveId: id })
        });
        refresh();
    }
</script>
</body>
</html>
