<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0f19; --glass: rgba(22, 27, 34, 0.8); --primary: #3b82f6; --danger: #f85149; --success: #238636; --text: #c9d1d9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        #auth-container { width: 340px; margin: 120px auto; background: var(--glass); backdrop-filter: blur(10px); padding: 40px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; background: rgba(0,0,0,0.3); border: 1px solid #30363d; color: white; border-radius: 8px; box-sizing: border-box; }
        
        #dashboard { display: none; max-width: 1400px; margin: 0 auto; }
        .tabs { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; color: var(--text); padding: 12px 25px; cursor: pointer; font-weight: 700; opacity: 0.6; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); opacity: 1; }

        .layout { display: flex; gap: 25px; }
        .main-col { flex: 2; height: 85vh; overflow-y: auto; padding-right: 10px; }
        .side-col { flex: 1; background: var(--glass); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); height: 85vh; display: flex; flex-direction: column; overflow: hidden; }

        .card { background: var(--glass); padding: 25px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; transition: 0.3s; position: relative; }
        .card.highlight { border-color: var(--primary); box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); transform: scale(1.02); }
        
        .btn { padding: 8px 16px; border-radius: 6px; border: none; font-size: 11px; font-weight: 600; cursor: pointer; margin-right: 5px; margin-bottom: 5px; }
        .btn-danger { background: #da3633; color: white; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-info { background: #5319e7; color: white; }

        .chat-area { flex-grow: 1; overflow-y: auto; padding: 20px; font-size: 12px; font-family: monospace; background: rgba(0,0,0,0.2); }
        .chat-msg { margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 8px; }
        
        .id-tag { background: #1e293b; color: var(--primary); padding: 2px 6px; border-radius: 4px; font-size: 10px; cursor: pointer; font-weight: bold; margin-right: 8px; border: 1px solid #334155; }
        .badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: bold; position: absolute; top: 25px; right: 25px; border: 1px solid #3b82f6; color: #3b82f6; }
    </style>
</head>
<body>
    <div id="auth-container">
        <h1>Nexus Command</h1>
        <input type="password" id="key-input" placeholder="Enter System Key">
        <button class="btn btn-primary" style="width:100%; padding:12px;" onclick="login()">AUTHORIZE</button>
    </div>

    <div id="dashboard">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('live', event)">LIVE MONITOR</button>
            <button class="tab-btn" onclick="switchTab('vault', event)">THE VAULT</button>
            <button class="btn btn-danger" style="margin-left:auto; width:auto;" onclick="location.reload()">LOGOUT</button>
        </div>
        
        <div id="live-view" class="layout">
            <div class="main-col" id="server-grid"></div>
            <div class="side-col">
                <h2 style="padding:20px; margin:0; font-size:14px;">Global Activity Feed</h2>
                <div class="chat-area" id="global-chat"></div>
            </div>
        </div>

        <div id="vault-view" style="display:none;" class="layout">
            <div class="main-col" id="archive-grid"></div>
        </div>
    </div>

    <script>
        let apiKey = "";
        let masterData = {};

        function login() {
            apiKey = document.getElementById('key-input').value;
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            setInterval(refresh, 3000);
            refresh();
        }

        function switchTab(t, e) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(e) e.target.classList.add('active');
            document.getElementById('live-view').style.display = t === 'live' ? 'flex' : 'none';
            document.getElementById('vault-view').style.display = t === 'vault' ? 'block' : 'none';
        }

        function scrollToServer(id) {
            switchTab('live');
            setTimeout(() => {
                const el = document.getElementById('card-' + id);
                if(el) {
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    el.classList.add('highlight');
                    setTimeout(() => el.classList.remove('highlight'), 3000);
                }
            }, 100);
        }

        function downloadTxt(jobId, chatArray, fileName) {
            if (!chatArray || chatArray.length === 0) return alert("No logs.");
            let content = `Nexus Log Export\nID: ${jobId}\n------------------\n\n`;
            chatArray.forEach(c => content += `[${c.t}] ${c.msg}\n`);
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${fileName}.txt`;
            a.click();
        }

        async function refresh() {
            const res = await fetch('/list-servers', { headers: { 'x-api-key': apiKey } });
            if(res.status === 401) location.reload();
            masterData = await res.json();
            
            const grid = document.getElementById('server-grid');
            grid.innerHTML = '';
            
            for (const [id, s] of Object.entries(masterData.servers)) {
                const div = document.createElement('div');
                div.className = 'card';
                div.id = 'card-' + id;
                div.innerHTML = `
                    <div class="badge">${s.isStudio?'STUDIO':'LIVE'}</div>
                    <div style="font-size:24px; font-weight:bold; color:white;">${s.playerCount} Users</div>
                    <div style="font-size:11px; margin-bottom:15px; opacity:0.5;">ID: ${id}</div>
                    <button class="btn btn-danger" onclick="terminate('${id}')">TERMINATE</button>
                    <button class="btn btn-success" onclick="archive('${id}')">ARCHIVE</button>
                    <button class="btn btn-info" onclick="downloadTxt('${id}', masterData.servers['${id}'].chats, 'Log_${id.substring(0,8)}')">DOWNLOAD</button>
                `;
                grid.appendChild(div);
            }

            document.getElementById('global-chat').innerHTML = masterData.global.map(c => `
                <div class="chat-msg">
                    <span class="id-tag" onclick="scrollToServer('${c.jobId}')">${c.jobId.substring(0,6)}</span>
                    <span style="font-size:10px; opacity:0.5;">${c.t}</span><br>
                    <span>${c.msg}</span>
                </div>
            `).join('');

            const arcGrid = document.getElementById('archive-grid');
            arcGrid.innerHTML = '';
            for (const [id, a] of Object.entries(masterData.archives)) {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div style="font-weight:bold; font-size:18px;">${a.name}</div>
                    <button class="btn btn-info" onclick="downloadTxt('${a.jobId}', masterData.archives['${id}'].chats, 'Archive_${a.name}')">DOWNLOAD</button>
                    <button class="btn btn-danger" onclick="deleteArchive('${id}')">PURGE</button>
                    <div class="chat-area" style="height:150px; margin-top:10px;">
                        ${a.chats.map(c => `<div>[${c.t}] ${c.msg}</div>`).join('')}
                    </div>
                `;
                arcGrid.appendChild(div);
            }
        }

        async function archive(id) {
            const name = prompt("Name this archive:");
            if(!name) return;
            await fetch('/archive-session', { method: 'POST', headers: { 'x-api-key': apiKey, 'Content-Type': 'application/json' }, body: JSON.stringify({ jobId: id, customName: name }) });
        }
        async function terminate(id) { await fetch('/kick-server', { method: 'POST', headers: { 'x-api-key': apiKey, 'Content-Type': 'application/json' }, body: JSON.stringify({ jobId: id }) }); }
        async function deleteArchive(id) { if(confirm("Purge?")) await fetch('/delete-archive', { method: 'POST', headers: { 'x-api-key': apiKey, 'Content-Type': 'application/json' }, body: JSON.stringify({ archiveId: id }) }); }
    </script>
</body>
</html>
